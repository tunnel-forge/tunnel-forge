Categories:
  - Connectivity
License: GPL-3.0-only
WebSite: https://github.com/evokelektrique/tunnel-forge
SourceCode: https://github.com/evokelektrique/tunnel-forge
IssueTracker: https://github.com/evokelektrique/tunnel-forge/issues
Changelog: https://github.com/evokelektrique/tunnel-forge/releases

RepoType: git
Repo: https://github.com/evokelektrique/tunnel-forge.git

Builds:
  - versionName: 0.7.2
    versionCode: 29
    commit: v0.7.2
    timeout: 14400
    sudo:
      - apt-get update
      - apt-get install -y golang-go cmake ninja-build
    output: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
    srclibs:
      - flutter@stable
      - mbedtls@v2.28.9
    rm:
      - ios
      - linux
      - macos
      - web
      - windows
    prebuild:
      - flutterVersion=$(sed -n -E "s/.*flutter-version:\ '(.*)'/\1/p" .github/workflows/release.yml)
      - '[[ $flutterVersion ]]'
      - git -C $$flutter$$ checkout -f $flutterVersion
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
      - echo "tunnelForgeMbedtlsSourceDir=$$mbedtls$$" >> android/gradle.properties
      - cd android/gvisor
      - go mod download
    scandelete:
      - .pub-cache
    scanignore:
      - android/gvisor/go.sum
      - $$flutter$$/bin/cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --split-per-abi --target-platform android-arm64

