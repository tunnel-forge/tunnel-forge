name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 15 * * 5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.2

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: java-kotlin
            build-mode: manual
          - language: c-cpp
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        if: matrix.build-mode == 'manual'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        if: matrix.build-mode == 'manual'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Gradle
        if: matrix.build-mode == 'manual'
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          dependency-caching: true

      - name: Install Flutter dependencies
        if: matrix.build-mode == 'manual'
        run: flutter pub get

      - name: Create Android local.properties
        if: matrix.build-mode == 'manual'
        working-directory: android
        shell: bash
        run: |
          flutter_root="${FLUTTER_ROOT:-$(dirname "$(dirname "$(command -v flutter)")")}"
          android_sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"

          if [[ -z "${android_sdk_root}" ]]; then
            echo "ANDROID_SDK_ROOT or ANDROID_HOME must be set" >&2
            exit 1
          fi

          {
            echo "flutter.sdk=${flutter_root}"
            echo "sdk.dir=${android_sdk_root}"
          } > local.properties

      - name: Build code for CodeQL
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          sh tool/run_native_tests.sh
          cd android
          ./gradlew --stacktrace app:assembleDebug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
