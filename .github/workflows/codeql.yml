name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 15 * * 5"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: 3.41.2

defaults:
  run:
    shell: bash

jobs:
  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:actions

  analyze-compiled:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        language:
          - java-kotlin
          - c-cpp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: manual
          dependency-caching: true
          config-file: ./.github/codeql/codeql-config.yml

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Create Android local.properties
        working-directory: android
        run: |
          flutter_root="${FLUTTER_ROOT:-$(dirname "$(dirname "$(command -v flutter)")")}"
          android_sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"

          if [[ -z "${android_sdk_root}" ]]; then
            echo "ANDROID_SDK_ROOT or ANDROID_HOME must be set" >&2
            exit 1
          fi

          {
            echo "flutter.sdk=${flutter_root}"
            echo "sdk.dir=${android_sdk_root}"
          } > local.properties

      - name: Build Android app for CodeQL
        working-directory: android
        run: |
          ./gradlew --stop || true
          ./gradlew --no-daemon --no-build-cache --rerun-tasks --console=plain --stacktrace -Dorg.gradle.vfs.watch=false clean :app:assembleDebug

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
